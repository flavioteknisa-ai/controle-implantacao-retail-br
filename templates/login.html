<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Controle de Férias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a237e 0%, #0d47a1 60%, #01579b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      width: 100%;
      max-width: 400px;
      padding: 40px 36px 36px;
    }
    .login-logo {
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 6px;
    }
    .login-title {
      text-align: center;
      font-weight: 800;
      color: #1a237e;
      font-size: 1.3rem;
      margin-bottom: 2px;
    }
    .login-sub {
      text-align: center;
      color: #888;
      font-size: .8rem;
      margin-bottom: 28px;
    }
    .form-control {
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .9rem;
      border-color: #d0d0d0;
    }
    .form-control:focus {
      border-color: #3949ab;
      box-shadow: 0 0 0 3px rgba(57,73,171,.15);
    }
    .btn-login {
      background: linear-gradient(135deg, #1a237e, #1565c0);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-weight: 700;
      font-size: .95rem;
      width: 100%;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; color: #fff; }
    .input-group-text {
      background: #f5f5f5;
      border-color: #d0d0d0;
      border-radius: 10px 0 0 10px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">📅</div>
    <div class="login-title">Controle de Férias</div>
    <div class="login-sub">Retail BR · Teknisa</div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
      <div class="alert alert-{{ cat }} py-2 small mb-3">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label small fw-semibold mb-1">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person text-muted"></i></span>
          <input type="text" class="form-control" name="username"
                 placeholder="seu.login" autocomplete="username" required autofocus
                 style="border-radius:0 10px 10px 0;">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold mb-1">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" class="form-control" name="senha"
                 placeholder="••••••••" autocomplete="current-password" required
                 style="border-radius:0 10px 10px 0;">
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>
  </div>
</body>
</html>
