<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Controle Implantação Retail BR</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --brand:       #0340AB;
      --brand-dark:  #022C78;
      --brand-deep:  #01205C;
      --brand-glow:  #1F56CF;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      background: radial-gradient(ellipse at 20% 20%, #063bb0 0%, var(--brand-dark) 45%, var(--brand-deep) 100%);
    }

    /* ── Camada 1: grade tecnológica animada ───────────────── */
    .tech-grid {
      position: absolute; inset: -50%;
      background-image:
        linear-gradient(rgba(120,170,255,.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,170,255,.10) 1px, transparent 1px);
      background-size: 46px 46px;
      transform: perspective(420px) rotateX(58deg);
      transform-origin: center top;
      animation: gridMove 18s linear infinite;
      opacity: .55;
    }
    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 0 920px; }
    }

    /* ── Camada 2: blobs de brilho ─────────────────────────── */
    .glow {
      position: absolute; border-radius: 50%; filter: blur(70px);
      opacity: .45; animation: float 14s ease-in-out infinite;
    }
    .glow.g1 { width: 380px; height: 380px; background: #2e6bff; top: -90px; left: -60px; }
    .glow.g2 { width: 320px; height: 320px; background: #00d4ff; bottom: -80px; right: -40px; animation-delay: -5s; }
    .glow.g3 { width: 260px; height: 260px; background: #7b5cff; top: 40%; right: 18%; animation-delay: -9s; }
    @keyframes float {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(30px,-30px) scale(1.12); }
    }

    /* ── Camada 3: nós + circuitos (SVG) ───────────────────── */
    .circuit { position: absolute; inset: 0; width: 100%; height: 100%; opacity: .35; }
    .circuit .node  { fill: #8fd0ff; }
    .circuit .line  { stroke: #5fa8ff; stroke-width: 1; fill: none; }
    .pulse { animation: pulse 3.2s ease-in-out infinite; }
    .pulse2 { animation: pulse 3.2s ease-in-out infinite; animation-delay: 1.4s; }
    @keyframes pulse { 0%,100%{ opacity:.25 } 50%{ opacity:1 } }

    /* ── Partículas flutuantes ─────────────────────────────── */
    .particles { position: absolute; inset: 0; overflow: hidden; }
    .particles span {
      position: absolute; bottom: -10px; width: 4px; height: 4px; border-radius: 50%;
      background: rgba(160,210,255,.8); box-shadow: 0 0 8px rgba(120,180,255,.9);
      animation: rise linear infinite;
    }
    @keyframes rise {
      to { transform: translateY(-110vh); opacity: 0; }
    }

    /* ── Card de login (glassmorphism) ─────────────────────── */
    .login-wrap { position: relative; z-index: 5; width: 100%; max-width: 420px; padding: 16px; }
    .login-card {
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(0,16,60,.55);
      padding: 42px 38px 36px;
      color: #fff;
      animation: cardIn .6s cubic-bezier(.21,1.02,.73,1) both;
    }
    @keyframes cardIn { from { opacity:0; transform: translateY(22px) scale(.97); } to { opacity:1; transform:none; } }

    .brand-badge {
      width: 64px; height: 64px; margin: 0 auto 16px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1F56CF, #00bcd4);
      box-shadow: 0 8px 28px rgba(31,86,207,.55), inset 0 0 0 1px rgba(255,255,255,.25);
      font-size: 1.9rem; color: #fff;
    }
    .login-title {
      text-align: center; font-weight: 800; font-size: 1.32rem; letter-spacing: .3px;
      margin: 0; line-height: 1.25; text-shadow: 0 2px 12px rgba(0,0,0,.3);
    }
    .login-sub {
      text-align: center; color: rgba(220,235,255,.7);
      font-size: .78rem; letter-spacing: 2px; text-transform: uppercase;
      margin: 6px 0 26px;
    }

    .form-label { font-size: .76rem; font-weight: 600; letter-spacing: .4px;
                  color: rgba(220,235,255,.85); margin-bottom: 5px; }
    .input-group-text {
      background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.18);
      border-right: none; border-radius: 12px 0 0 12px; color: #9fc4ff;
    }
    .form-control {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
      border-left: none; border-radius: 0 12px 12px 0;
      color: #fff; padding: 11px 14px; font-size: .92rem;
    }
    .form-control::placeholder { color: rgba(220,235,255,.45); }
    .form-control:focus {
      background: rgba(255,255,255,.14); color: #fff; border-color: #4f8bff;
      box-shadow: 0 0 0 3px rgba(79,139,255,.25); outline: none;
    }
    .form-control:focus + nothing {}
    .input-group:focus-within .input-group-text { border-color: #4f8bff; color: #fff; }

    .btn-login {
      width: 100%; margin-top: 6px; padding: 12px;
      background: linear-gradient(135deg, #1F56CF 0%, #0340AB 60%, #00a6c4 130%);
      background-size: 180% 180%; background-position: 0% 50%;
      color: #fff; border: none; border-radius: 12px;
      font-weight: 700; font-size: .96rem; letter-spacing: .3px;
      box-shadow: 0 10px 28px rgba(3,64,171,.5);
      transition: background-position .5s ease, transform .12s ease, box-shadow .2s;
    }
    .btn-login:hover { background-position: 100% 50%; color:#fff; transform: translateY(-1px);
                       box-shadow: 0 14px 34px rgba(3,64,171,.6); }
    .btn-login:active { transform: translateY(0); }

    .login-foot { text-align: center; margin-top: 22px; font-size: .72rem;
                  color: rgba(210,228,255,.55); letter-spacing: .5px; }
    .login-foot i { color: #6fe0ff; }

    .alert { border: none; border-radius: 12px; }
  </style>
</head>
<body>
  <!-- Fundo tecnológico -->
  <div class="tech-grid"></div>
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <div class="glow g3"></div>

  <svg class="circuit" preserveAspectRatio="none" viewBox="0 0 1440 900">
    <path class="line pulse"  d="M0,160 H320 L380,220 H720"/>
    <path class="line pulse2" d="M1440,300 H1080 L1010,370 H640"/>
    <path class="line pulse"  d="M120,900 V640 L200,560 V300"/>
    <path class="line pulse2" d="M1320,900 V700 L1240,620 V420"/>
    <circle class="node pulse"  cx="320" cy="160" r="4"/>
    <circle class="node pulse2" cx="720" cy="220" r="4"/>
    <circle class="node pulse2" cx="1080" cy="300" r="4"/>
    <circle class="node pulse"  cx="640" cy="370" r="4"/>
    <circle class="node pulse2" cx="200" cy="560" r="4"/>
    <circle class="node pulse"  cx="1240" cy="620" r="4"/>
  </svg>

  <div class="particles" id="particles"></div>

  <!-- Card -->
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand-badge"><i class="bi bi-diagram-3-fill"></i></div>
      <h1 class="login-title">Controle Implantação<br>Retail BR</h1>
      <div class="login-sub">Gestão de Tecnologia</div>

      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in msgs %}
        <div class="alert alert-{{ cat }} py-2 small mb-3">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">USUÁRIO</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" class="form-control" name="username"
                   placeholder="seu.login" autocomplete="username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">SENHA</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-shield-lock-fill"></i></span>
            <input type="password" class="form-control" name="senha"
                   placeholder="••••••••" autocomplete="current-password" required>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Acessar Plataforma
        </button>
      </form>

      <div class="login-foot">
        <i class="bi bi-shield-check me-1"></i>Ambiente seguro · Teknisa · v1.0
      </div>
    </div>
  </div>

  <script>
    // Gerar partículas flutuantes
    (function () {
      const box = document.getElementById('particles');
      const n = 26;
      for (let i = 0; i < n; i++) {
        const s = document.createElement('span');
        const size = 2 + Math.random() * 4;
        s.style.left = Math.random() * 100 + 'vw';
        s.style.width = s.style.height = size + 'px';
        s.style.animationDuration = (8 + Math.random() * 12) + 's';
        s.style.animationDelay = (-Math.random() * 12) + 's';
        s.style.opacity = (0.3 + Math.random() * 0.6).toFixed(2);
        box.appendChild(s);
      }
    })();
  </script>
</body>
</html>
